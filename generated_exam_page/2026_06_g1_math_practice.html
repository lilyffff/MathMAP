<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>수학문제 응시</title>
  <style>
    :root {
      --bg: #f5f5f5;
      --paper: #ffffff;
      --ink: #111827;
      --muted: #4b5563;
      --line: #cfd5dd;
      --green: #008000;
      --blue: #1d4ed8;
      --student: #f97316;
      --teacher: #2563eb;
      --admin: #7c3aed;
      --soft: #eef4ff;
      --short: #fff7ed;
      --radius: 6px;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Malgun Gothic", "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    button, input { font: inherit; }
    select { font: inherit; }
    button, input, select {
      border-radius: var(--radius);
    }
    .hidden { display: none !important; }
    .login-panel,
    .start-box,
    .file-item,
    .exam-card,
    .filter-row,
    .table-wrap,
    .stat-card,
    .topbar,
    .question-area,
    .answer-sheet,
    .short-answer-panel,
    .score-modal,
    .explanation-modal,
    .problem-image,
    .explanation-image {
      border-radius: var(--radius);
    }
    .app-shell {
      min-height: 100%;
      background: var(--bg);
      overflow: auto;
    }
    .brand-bar {
      min-height: 58px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 18px;
    }
    .brand {
      border: 0;
      background: transparent;
      color: var(--admin);
      cursor: pointer;
      font-size: 24px;
      font-weight: 900;
      padding: 0;
    }
    .session-label {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .logout-btn {
      min-height: 32px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      padding: 4px 12px;
    }
    .login-wrap {
      min-height: calc(100vh - 58px);
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-panel {
      width: min(440px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 18px;
    }
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }
    .tab-btn {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      font-weight: 800;
    }
    .tab-btn.student.active {
      border-color: var(--student);
      color: var(--student);
      background: #fff7ed;
    }
    .tab-btn.teacher.active {
      border-color: var(--teacher);
      color: var(--teacher);
      background: #eff6ff;
    }
    .login-title {
      margin: 0 0 12px;
      font-size: 20px;
      text-align: center;
    }
    .login-title.student { color: var(--student); }
    .login-title.teacher { color: var(--teacher); }
    .login-title.admin { color: var(--admin); }
    .login-form {
      display: grid;
      gap: 10px;
    }
    .login-form label {
      display: grid;
      gap: 5px;
      font-weight: 800;
      font-size: 14px;
    }
    .login-form input {
      min-height: 38px;
      border: 1px solid var(--line);
      padding: 6px 9px;
    }
    .login-submit {
      min-height: 40px;
      border: 1px solid currentColor;
      background: #fff;
      cursor: pointer;
      font-weight: 900;
    }
    .login-submit.student { color: var(--student); }
    .login-submit.teacher { color: var(--teacher); }
    .login-submit.admin { color: var(--admin); }
    .login-error {
      min-height: 18px;
      color: #dc2626;
      font-size: 13px;
      font-weight: 700;
    }
    .dashboard {
      min-height: calc(100vh - 58px);
      padding: 18px;
      overflow: auto;
    }
    .dashboard-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }
    .dashboard-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .dashboard-title {
      margin: 0;
      font-size: 22px;
    }
    .dashboard-title.student { color: var(--student); }
    .dashboard-title.teacher { color: var(--teacher); }
    .dashboard-title.admin { color: var(--admin); }
    .dashboard-sub {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }
    .exam-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 12px;
    }
    .exam-card {
      min-height: 142px;
      border: 1px solid #fed7aa;
      background: #fff;
      cursor: pointer;
      text-align: left;
      padding: 14px;
      display: grid;
      align-content: space-between;
      gap: 12px;
    }
    .exam-card:hover {
      background: #fff7ed;
    }
    .exam-card-title {
      color: var(--student);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
    }
    .exam-card-meta {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: end;
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 12px;
    }
    .filter-row label {
      display: grid;
      gap: 4px;
      min-width: 120px;
      font-weight: 800;
      color: var(--muted);
      font-size: 13px;
    }
    .filter-row select {
      min-height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 4px 8px;
    }
    .table-wrap {
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
    }
    .record-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }
    .record-table th,
    .record-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 9px 10px;
      text-align: left;
      font-size: 14px;
    }
    .record-table th {
      background: #f8fafc;
      font-weight: 900;
      color: var(--muted);
    }
    .empty-row {
      color: var(--muted);
      text-align: center !important;
      padding: 22px !important;
    }
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid #ddd6fe;
      padding: 12px;
    }
    .stat-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .stat-value {
      margin-top: 6px;
      color: var(--admin);
      font-size: 24px;
      font-weight: 900;
    }
    .start-screen {
      height: 100%;
      display: block;
    }
    .start-box {
      width: min(720px, 100%);
      background: var(--paper);
      border: 1px solid var(--line);
      padding: 20px;
    }
    .start-box h1 {
      margin: 0 0 16px;
      font-size: 20px;
      color: var(--green);
      text-align: center;
    }
    .file-list {
      display: grid;
      gap: 8px;
    }
    .file-item {
      min-height: 44px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
      text-align: left;
      padding: 8px 10px;
    }
    .file-item:hover {
      background: var(--soft);
    }
    .exam-screen {
      height: 100%;
      display: grid;
      grid-template-rows: 60px minmax(0, 1fr) 62px;
    }
    .topbar {
      border: 1px solid var(--line);
      border-bottom: 0;
      background: var(--paper);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 0 14px;
      gap: 12px;
    }
    .top-center {
      text-align: center;
      font-weight: 800;
      color: var(--green);
    }
    .timer {
      color: #111;
      font-weight: 500;
      margin-left: 12px;
    }
    .home-btn {
      min-width: 64px;
      min-height: 32px;
      border: 1px solid var(--green);
      background: #fff;
      cursor: pointer;
    }
    .main-layout {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 132px;
      gap: 4px;
      padding: 0 4px;
    }
    .question-area {
      min-height: 0;
      background: var(--paper);
      border: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
    }
    .question-head {
      min-height: 34px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 5px 10px;
    }
    .question-title {
      font-weight: 800;
      font-size: 16px;
    }
    .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }
    .explain-btn {
      min-width: 72px;
      min-height: 28px;
      border: 1px solid var(--blue);
      background: #fff;
      color: var(--blue);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .problem-view {
      min-height: 0;
      overflow: auto;
      padding: 1cm 14px 14px;
      background: #fff;
    }
    .problem-image {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }
    .short-answer-panel {
      display: none;
      border-top: 1px solid var(--line);
      background: var(--short);
      padding: 10px 12px;
    }
    .short-answer-panel.visible {
      display: block;
    }
    .short-title {
      font-weight: 800;
      margin-bottom: 8px;
    }
    .short-inputs {
      display: grid;
      grid-template-columns: repeat(3, minmax(120px, 1fr));
      gap: 8px;
    }
    .short-field {
      display: grid;
      gap: 5px;
      font-weight: 700;
    }
    .short-field input {
      min-height: 34px;
      border: 1px solid var(--line);
      padding: 4px 8px;
      background: #fff;
    }
    .answer-sheet {
      min-height: 0;
      background: var(--paper);
      border: 1px solid var(--line);
      display: grid;
      grid-template-rows: 30px minmax(0, 1fr) 42px;
      overflow: hidden;
    }
    .subject {
      display: grid;
      place-items: center;
      border-bottom: 1px solid var(--line);
      color: var(--green);
      font-weight: 800;
      font-size: 14px;
    }
    .answer-rows {
      min-height: 0;
      overflow-y: auto;
    }
    .answer-row {
      display: grid;
      grid-template-columns: 25px repeat(5, 20px);
      align-items: center;
      min-height: 25px;
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
    }
    .answer-row.short-row {
      grid-template-columns: 25px 1fr;
      background: var(--short);
    }
    .answer-row.current {
      background: var(--soft);
      outline: 2px solid rgba(29, 78, 216, .25);
      outline-offset: -2px;
    }
    .answer-row.answered .num {
      background: #ecfdf5;
    }
    .num {
      height: 100%;
      border: 0;
      border-right: 1px solid #e5e7eb;
      background: transparent;
      color: var(--green);
      font-weight: 800;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
    }
    .short-open {
      height: 24px;
      border: 0;
      background: transparent;
      cursor: pointer;
      color: #9a3412;
      font-weight: 800;
      font-size: 12px;
    }
    .bubble {
      position: relative;
      display: grid;
      place-items: center;
      height: 24px;
      cursor: pointer;
      user-select: none;
      font-size: 13px;
      line-height: 1;
    }
    .bubble input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }
    .bubble span {
      width: 17px;
      height: 17px;
      display: grid;
      place-items: center;
      border-radius: 50%;
    }
    .bubble input:checked + span {
      background: var(--ink);
      color: #fff;
      font-weight: 800;
    }
    .submit-wrap {
      display: grid;
      place-items: center;
      border-top: 1px solid var(--line);
      background: #fff;
    }
    .submit-btn {
      min-width: 78px;
      min-height: 30px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }
    .bottom-nav {
      border: 1px solid var(--line);
      border-top: 0;
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }
    .nav-btn {
      min-width: 45px;
      min-height: 31px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }
    .score-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(17, 24, 39, .38);
    }
    .score-modal {
      width: min(360px, 100%);
      background: #fff;
      border: 1px solid var(--line);
      padding: 18px;
      box-shadow: 0 18px 40px rgba(17, 24, 39, .2);
    }
    .score-modal h2 {
      margin: 0 0 14px;
      color: var(--green);
      font-size: 19px;
      text-align: center;
    }
    .score-main {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
      text-align: center;
    }
    .score-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--ink);
    }
    .score-detail {
      color: var(--muted);
      font-size: 14px;
    }
    .score-close {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--green);
      background: #fff;
      cursor: pointer;
    }
    .explanation-modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      padding: 18px;
      background: rgba(17, 24, 39, .45);
    }
    .explanation-modal {
      width: min(980px, 100%);
      height: min(760px, 92vh);
      background: #fff;
      border: 1px solid var(--line);
      display: grid;
      grid-template-rows: 42px minmax(0, 1fr);
    }
    .explanation-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--line);
      font-weight: 800;
      color: var(--green);
    }
    .explanation-close {
      min-width: 54px;
      min-height: 28px;
      border: 1px solid var(--line);
      background: #fff;
      cursor: pointer;
    }
    .explanation-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      background: #fff;
    }
    .explanation-image {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }
    .explanation-empty {
      min-height: 160px;
      display: grid;
      place-items: center;
      color: var(--muted);
    }
    .explanation-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    @media (max-width: 760px) {
      body { overflow: auto; }
      .exam-screen {
        min-height: 100%;
        height: auto;
        grid-template-rows: auto auto auto;
      }
      .topbar {
        grid-template-columns: 1fr;
        padding: 10px;
      }
      .main-layout {
        grid-template-columns: 1fr;
      }
      .answer-sheet {
        min-height: 340px;
      }
      .short-inputs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <section id="authScreen" class="app-shell">
    <header class="brand-bar">
      <button id="brandBtn" class="brand" type="button">Math맵</button>
      <div class="session-label">수열 모의고사 풀이 앱</div>
    </header>
    <main class="login-wrap">
      <section class="login-panel">
        <div class="tabs">
          <button id="studentTabBtn" class="tab-btn student active" type="button">학생</button>
          <button id="teacherTabBtn" class="tab-btn teacher" type="button">교사</button>
        </div>
        <h1 id="loginTitle" class="login-title student">학생 로그인</h1>
        <form id="loginForm" class="login-form">
          <label>
            <span id="loginIdLabel">학번</span>
            <input id="loginId" type="text" autocomplete="username" placeholder="예: 10101" />
          </label>
          <label>
            <span>패스워드</span>
            <input id="loginPw" type="password" autocomplete="current-password" placeholder="초기 패스워드" />
          </label>
          <div id="loginError" class="login-error"></div>
          <button id="loginSubmit" class="login-submit student" type="submit">로그인</button>
        </form>
      </section>
    </main>
  </section>

  <section id="startScreen" class="app-shell start-screen hidden">
    <header class="brand-bar">
      <button class="brand appHomeBtn" type="button">Math맵</button>
      <div class="session-label" id="studentSessionLabel"></div>
      <button class="logout-btn logoutBtn" type="button">로그아웃</button>
    </header>
    <main class="dashboard">
      <div class="dashboard-inner">
        <div class="dashboard-head">
          <div>
            <h1 class="dashboard-title student">학생 대시보드</h1>
            <p class="dashboard-sub">풀고 싶은 모의고사 카드를 선택하세요.</p>
          </div>
        </div>
        <div id="fileList" class="exam-card-grid"></div>
      </div>
    </main>
  </section>

  <section id="teacherScreen" class="app-shell hidden">
    <header class="brand-bar">
      <button class="brand appHomeBtn" type="button">Math맵</button>
      <div class="session-label" id="teacherSessionLabel"></div>
      <button class="logout-btn logoutBtn" type="button">로그아웃</button>
    </header>
    <main class="dashboard">
      <div class="dashboard-inner">
        <div class="dashboard-head">
          <div>
            <h1 class="dashboard-title teacher">교사 대시보드</h1>
            <p class="dashboard-sub">학년과 반을 선택하면 응시 기록을 볼 수 있습니다.</p>
          </div>
        </div>
        <div class="filter-row">
          <label>
            학년
            <select id="teacherGradeSelect"></select>
          </label>
          <label>
            반
            <select id="teacherClassSelect"></select>
          </label>
        </div>
        <div class="table-wrap">
          <table class="record-table">
            <thead>
              <tr>
                <th>학번</th>
                <th>응시한 문서파일명</th>
                <th>점수</th>
                <th>제출일자</th>
              </tr>
            </thead>
            <tbody id="teacherRecordBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </section>

  <section id="adminScreen" class="app-shell hidden">
    <header class="brand-bar">
      <button class="brand appHomeBtn" type="button">Math맵</button>
      <div class="session-label" id="adminSessionLabel"></div>
      <button class="logout-btn logoutBtn" type="button">로그아웃</button>
    </header>
    <main class="dashboard">
      <div class="dashboard-inner">
        <div class="dashboard-head">
          <div>
            <h1 class="dashboard-title admin">관리자 대시보드</h1>
            <p class="dashboard-sub">앱 전체 응시 현황을 확인합니다.</p>
          </div>
        </div>
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">전체 제출</div>
            <div id="adminTotalSubmissions" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">응시 학생</div>
            <div id="adminTotalStudents" class="stat-value">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">평균 점수</div>
            <div id="adminAverageScore" class="stat-value">0점</div>
          </div>
        </div>
        <div class="table-wrap">
          <table class="record-table">
            <thead>
              <tr>
                <th>학년</th>
                <th>반</th>
                <th>학번</th>
                <th>응시한 문서파일명</th>
                <th>점수</th>
                <th>제출일자</th>
              </tr>
            </thead>
            <tbody id="adminRecordBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </section>

  <section id="examScreen" class="exam-screen hidden">
    <header class="topbar">
      <div class="top-center">
        <span id="examFileName"></span>
        <span class="timer">Timer <span id="timerText">50분 00초</span></span>
      </div>
      <button id="homeBtn" class="home-btn" type="button">첫화면</button>
    </header>

    <main class="main-layout">
      <section class="question-area">
        <div class="question-head">
          <div class="question-title" id="questionTitle">1번 문제</div>
          <button id="explanationBtn" class="explain-btn hidden" type="button">해설보기</button>
          <div class="hint"><span id="answeredCount">0</span> / 30</div>
        </div>
        <div class="problem-view">
          <img id="problemImage" class="problem-image" alt="수학 문제" />
        </div>
        <div id="shortAnswerPanel" class="short-answer-panel"></div>

{"number": 26, "page": 10, "image": "assets/problem_26.png", "width": 746, "height": 364, "kind": "short", "labels": ["정답"], "correct": "11", "score": 4, "explanation": {"image": "assets/explanation_26.png", "width": 350, "height": 455}}, {"number": 27, "page": 11, "image": "assets/problem_27.png", "width": 749, "height": 924, "kind": "short", "labels": ["정답"], "correct": "82", "score": 4, "explanation": {"image": "assets/explanation_27.png", "width": 350, "height": 300}}, {"number": 28, "page": 11, "image": "assets/problem_28.png", "width": 746, "height": 378, "kind": "short", "labels": ["정답"], "correct": "143", "score": 4, "explanation": {"image": "assets/explanation_28.png", "width": 350, "height": 327}}, {"number": 29, "page": 12, "image": "assets/problem_29.png", "width": 749, "height": 434, "kind": "short", "labels": ["정답"], "correct": "84", "score": 4, "explanation": {"image": "assets/explanation_29.png", "width": 680, "height": 307}}, {"number": 30, "page": 12, "image": "assets/problem_30.png", "width": 746, "height": 434, "kind": "short", "labels": ["정답"], "correct": "23", "score": 4, "explanation": {"image": "assets/explanation_30.png", "width": 680, "height": 880}}]}];
    const total = 30;
    const examSeconds = 50 * 60;
    const labels = ["\u2460", "\u2461", "\u2462", "\u2463", "\u2464"];
    const submissionKey = "mathmap-submissions";
    const adminAccount = { id: "lily.jeongwon@gmail.com", password: "123" };
    let activeExam = examFiles[0];
    let loginRole = "student";
    let currentUser = null;
    let current = 1;
    let answers = {};
    let remainingSeconds = examSeconds;
    let timerId = null;
    let reviewMode = false;
    let reviewNumbers = [];
    let lastGrading = null;
    let gradingConfirmCount = 0;
    let explanationEnabled = false;

    function storageKey() {
      const userPart = currentUser && currentUser.role === "student" ? currentUser.id : "guest";
      return `math-answer-sheet-${activeExam.id}-${userPart}`;
    }

    function parseStudentId(id) {
      const clean = String(id || "").trim();
      if (!/^\d{5}$/.test(clean)) return null;
      const grade = Number(clean.slice(0, 1));
      const classNo = Number(clean.slice(1, 3));
      const number = Number(clean.slice(3, 5));
      if (![1, 2, 3].includes(grade)) return null;
      if (classNo < 1 || classNo > 10) return null;
      if (number < 1 || number > 99) return null;
      return { id: clean, grade, classNo, number, role: "student" };
    }

    function showOnly(screenId) {
      ["authScreen", "startScreen", "teacherScreen", "adminScreen", "examScreen"].forEach(id => {
        document.getElementById(id).classList.toggle("hidden", id !== screenId);
      });
    }

    function setLoginRole(role) {
      loginRole = role;
      const title = document.getElementById("loginTitle");
      const idLabel = document.getElementById("loginIdLabel");
      const submit = document.getElementById("loginSubmit");
      document.getElementById("studentTabBtn").classList.toggle("active", role === "student");
      document.getElementById("teacherTabBtn").classList.toggle("active", role === "teacher");
      title.className = `login-title ${role}`;
      submit.className = `login-submit ${role}`;
      document.getElementById("loginError").textContent = "";
      document.getElementById("loginId").value = "";
      document.getElementById("loginPw").value = "";
      if (role === "student") {
        title.textContent = "학생 로그인";
        idLabel.textContent = "학번";
        document.getElementById("loginId").placeholder = "예: 10101";
      } else if (role === "teacher") {
        title.textContent = "교사 로그인";
        idLabel.textContent = "휴대폰 번호";
        document.getElementById("loginId").placeholder = "예: 01012345678";
      } else {
        title.textContent = "관리자 로그인";
        idLabel.textContent = "관리자 ID";
        document.getElementById("loginId").placeholder = "lily.jeongwon@gmail.com";
      }
    }

    function logout() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      currentUser = null;
      reviewMode = false;
      reviewNumbers = [];
      lastGrading = null;
      gradingConfirmCount = 0;
      explanationEnabled = false;
      setLoginRole("student");
      showOnly("authScreen");
    }

    function loadAnswers() {
      try {
        return JSON.parse(localStorage.getItem(storageKey()) || "{}");
      } catch {
        return {};
      }
    }

    function loadSubmissions() {
      try {
        return JSON.parse(localStorage.getItem(submissionKey) || "[]");
      } catch {
        return [];
      }
    }

    function saveSubmissions(records) {
      localStorage.setItem(submissionKey, JSON.stringify(records));
    }

    function formatDateTime(date) {
      const pad = value => String(value).padStart(2, "0");
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ` +
        `${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function saveSubmission(result) {
      if (!currentUser || currentUser.role !== "student") return;
      const records = loadSubmissions();
      records.push({
        studentId: currentUser.id,
        grade: currentUser.grade,
        classNo: currentUser.classNo,
        examId: activeExam.id,
        examName: activeExam.name,
        score: result.earned,
        maxScore: result.maxScore,
        submittedAt: new Date().toISOString(),
      });
      saveSubmissions(records);
    }

    function saveAnswers() {
      localStorage.setItem(storageKey(), JSON.stringify(answers));
      renderRows();
      updateCount();
    }

    function answerIsFilled(value) {
      if (!value) return false;
      if (typeof value === "string") return value.trim().length > 0;
      return Object.values(value).some(text => String(text || "").trim().length > 0);
    }

    function updateCount() {
      const visible = getVisibleNumbers();
      const count = visible.filter(number => answerIsFilled(answers[number])).length;
      document.getElementById("answeredCount").textContent = count;
      const denominator = reviewMode ? reviewNumbers.length : total;
      document.querySelector(".hint").lastChild.textContent = ` / ${denominator}`;
    }

    function getProblem(number) {
      return activeExam.problems.find(problem => problem.number === number);
    }

    function getVisibleNumbers() {
      if (reviewMode && reviewNumbers.length > 0) return reviewNumbers;
      return Array.from({ length: total }, (_, index) => index + 1);
    }

    function sanitizeAnswers() {
      activeExam.problems.forEach(problem => {
        const value = answers[problem.number];
        if (value === undefined) return;
        if (problem.kind === "choice" && typeof value !== "string") {
          delete answers[problem.number];
        }
        if (problem.kind === "short" && (typeof value !== "object" || Array.isArray(value))) {
          delete answers[problem.number];
        }
      });
    }

    function renderGradeClassOptions() {
      const gradeSelect = document.getElementById("teacherGradeSelect");
      const classSelect = document.getElementById("teacherClassSelect");
      if (gradeSelect.options.length === 0) {
        [1, 2, 3].forEach(grade => {
          const option = document.createElement("option");
          option.value = String(grade);
          option.textContent = `${grade}학년`;
          gradeSelect.appendChild(option);
        });
      }
      if (classSelect.options.length === 0) {
        Array.from({ length: 10 }, (_, index) => index + 1).forEach(classNo => {
          const option = document.createElement("option");
          option.value = String(classNo);
          option.textContent = `${classNo}반`;
          classSelect.appendChild(option);
        });
      }
    }

    function recordDateText(record) {
      const date = new Date(record.submittedAt);
      if (Number.isNaN(date.getTime())) return "";
      return formatDateTime(date);
    }

    function renderTeacherRecords() {
      const body = document.getElementById("teacherRecordBody");
      const grade = Number(document.getElementById("teacherGradeSelect").value || 1);
      const classNo = Number(document.getElementById("teacherClassSelect").value || 1);
      const rows = loadSubmissions()
        .filter(record => Number(record.grade) === grade && Number(record.classNo) === classNo)
        .sort((a, b) => String(b.submittedAt).localeCompare(String(a.submittedAt)));
      body.innerHTML = "";
      if (rows.length === 0) {
        body.innerHTML = `<tr><td class="empty-row" colspan="4">${grade}학년 ${classNo}반 제출 기록이 없습니다.</td></tr>`;
        return;
      }
      rows.forEach(record => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${record.studentId}</td>
          <td>${record.examName}</td>
          <td>${record.score} / ${record.maxScore}</td>
          <td>${recordDateText(record)}</td>
        `;
        body.appendChild(tr);
      });
    }

    function renderAdminDashboard() {
      const records = loadSubmissions().sort((a, b) => String(b.submittedAt).localeCompare(String(a.submittedAt)));
      const students = new Set(records.map(record => record.studentId));
      const average = records.length
        ? Math.round(records.reduce((sum, record) => sum + Number(record.score || 0), 0) / records.length)
        : 0;
      document.getElementById("adminTotalSubmissions").textContent = records.length;
      document.getElementById("adminTotalStudents").textContent = students.size;
      document.getElementById("adminAverageScore").textContent = `${average}점`;

      const body = document.getElementById("adminRecordBody");
      body.innerHTML = "";
      if (records.length === 0) {
        body.innerHTML = `<tr><td class="empty-row" colspan="6">아직 제출 기록이 없습니다.</td></tr>`;
        return;
      }
      records.forEach(record => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${record.grade}</td>
          <td>${record.classNo}</td>
          <td>${record.studentId}</td>
          <td>${record.examName}</td>
          <td>${record.score} / ${record.maxScore}</td>
          <td>${recordDateText(record)}</td>
        `;
        body.appendChild(tr);
      });
    }

    function formatTime(seconds) {
      const safe = Math.max(0, seconds);
      const minutes = Math.floor(safe / 60);
      const rest = safe % 60;
      return `${minutes}분 ${String(rest).padStart(2, "0")}초`;
    }

    function startTimer(reset = false) {
      if (reset) remainingSeconds = examSeconds;
      document.getElementById("timerText").textContent = formatTime(remainingSeconds);
      if (timerId) clearInterval(timerId);
      timerId = setInterval(() => {
        remainingSeconds -= 1;
        document.getElementById("timerText").textContent = formatTime(remainingSeconds);
        if (remainingSeconds <= 0) {
          clearInterval(timerId);
          timerId = null;
          alert("시험 시간이 종료되었습니다.");
        }
      }, 1000);
    }

    function handleLogin(event) {
      event.preventDefault();
      const id = document.getElementById("loginId").value.trim();
      const password = document.getElementById("loginPw").value.trim();
      const error = document.getElementById("loginError");
      error.textContent = "";

      if (loginRole === "student") {
        const student = parseStudentId(id);
        if (!student || password !== "1") {
          error.textContent = "학번 또는 패스워드를 확인하세요.";
          return;
        }
        currentUser = student;
        document.getElementById("studentSessionLabel").textContent =
          `${student.grade}학년 ${student.classNo}반 ${student.number}번`;
        showStartScreen();
        return;
      }

      if (loginRole === "teacher") {
        if (!id || password !== "123") {
          error.textContent = "교사 ID 또는 패스워드를 확인하세요.";
          return;
        }
        currentUser = { id, role: "teacher" };
        document.getElementById("teacherSessionLabel").textContent = `교사 ${id}`;
        renderGradeClassOptions();
        renderTeacherRecords();
        showOnly("teacherScreen");
        return;
      }

      if (id !== adminAccount.id || password !== adminAccount.password) {
        error.textContent = "관리자 ID 또는 패스워드를 확인하세요.";
        return;
      }
      currentUser = { id, role: "admin" };
      document.getElementById("adminSessionLabel").textContent = `관리자 ${id}`;
      renderAdminDashboard();
      showOnly("adminScreen");
    }

    function showStartScreen() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      reviewMode = false;
      reviewNumbers = [];
      lastGrading = null;
      gradingConfirmCount = 0;
      explanationEnabled = false;
      if (currentUser && currentUser.role === "student") {
        document.getElementById("studentSessionLabel").textContent =
          `${currentUser.grade}학년 ${currentUser.classNo}반 ${currentUser.number}번`;
      }
      showOnly("startScreen");
      renderFileList();
    }

    function startExam(examId) {
      activeExam = examFiles.find(file => file.id === examId) || examFiles[0];
      answers = loadAnswers();
      reviewMode = false;
      reviewNumbers = [];
      lastGrading = null;
      gradingConfirmCount = 0;
      explanationEnabled = false;
      sanitizeAnswers();
      saveAnswers();
      current = 1;
      document.getElementById("examFileName").textContent = activeExam.name;
      showOnly("examScreen");
      startTimer(true);
      updateCount();
      selectProblem(1);
    }

    function renderFileList() {
      const box = document.getElementById("fileList");
      box.innerHTML = "";
      examFiles.forEach(file => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "exam-card";
        button.innerHTML = `
          <div class="exam-card-title">${file.name}</div>
          <div class="exam-card-meta">총 ${file.problems.length}문항 · 50분 · 클릭하면 1번 문제부터 시작</div>
        `;
        button.addEventListener("click", () => startExam(file.id));
        box.appendChild(button);
      });
    }

    function labelText(label) {
      if (label === "정답") return "정답";
      return `(${label})`;
    }

    function placeholderText(label) {
      if (label === "정답") return "정답";
      return `${labelText(label)} 정답`;
    }

    function renderShortAnswerPanel(problem) {
      const panel = document.getElementById("shortAnswerPanel");
      panel.innerHTML = "";
      panel.classList.toggle("visible", problem.kind === "short");
      if (problem.kind !== "short") return;

      const title = document.createElement("div");
      title.className = "short-title";
      title.textContent = "단답형 정답 표시";
      panel.appendChild(title);

      const inputs = document.createElement("div");
      inputs.className = "short-inputs";
      const saved = answers[problem.number] || {};
      problem.labels.forEach(label => {
        const field = document.createElement("label");
        field.className = "short-field";
        field.innerHTML = `<span>${labelText(label)}</span>`;
        const input = document.createElement("input");
        input.type = "text";
        input.value = saved[label] || "";
        input.placeholder = placeholderText(label);
        input.addEventListener("input", event => {
          const currentAnswer = answers[problem.number] || {};
          currentAnswer[label] = event.target.value;
          answers[problem.number] = currentAnswer;
          saveAnswers();
        });
        field.appendChild(input);
        inputs.appendChild(field);
      });
      panel.appendChild(inputs);
    }

    function updateExplanationButton() {
      const problem = getProblem(current);
      const button = document.getElementById("explanationBtn");
      const canShow =
        reviewMode &&
        explanationEnabled &&
        problem &&
        problem.explanation &&
        problem.explanation.image &&
        lastGrading &&
        lastGrading.wrongNumbers.includes(current);
      button.classList.toggle("hidden", !canShow);
    }

    function openExplanation() {
      const problem = getProblem(current);
      const explanation = problem && problem.explanation;
      if (!explanation || !explanation.image) return;
      const body = document.getElementById("explanationBody");
      body.innerHTML = "";
      document.getElementById("explanationTitle").textContent = `${current}번 해설`;

      const image = document.createElement("img");
      image.className = "explanation-image";
      image.src = explanation.image;
      image.width = explanation.width || 0;
      image.height = explanation.height || 0;
      image.alt = `${current}번 해설`;
      body.appendChild(image);
      document.getElementById("explanationModal").classList.remove("hidden");
    }

    function closeExplanation() {
      document.getElementById("explanationBody").innerHTML = "";
      document.getElementById("explanationModal").classList.add("hidden");
    }

    function selectProblem(number) {
      const visible = getVisibleNumbers();
      if (reviewMode && visible.length > 0 && !visible.includes(number)) {
        number = visible[0];
      }
      current = Math.min(total, Math.max(1, number));
      const problem = getProblem(current);
      document.getElementById("questionTitle").textContent = `${current}번 문제`;
      const image = document.getElementById("problemImage");
      image.src = problem.image;
      image.width = problem.width;
      image.height = problem.height;
      image.alt = `${current}번 문제`;
      renderShortAnswerPanel(problem);
      document.querySelector(".problem-view").scrollTop = 0;
      updateExplanationButton();
      renderRows();
    }

    function chooseAnswer(number, value) {
      answers[number] = value;
      current = number;
      selectProblem(number);
      saveAnswers();
    }

    function renderRows() {
      const box = document.getElementById("answerRows");
      box.innerHTML = "";
      getVisibleNumbers().forEach(number => {
        const problem = getProblem(number);
        const row = document.createElement("div");
        row.className = "answer-row";
        row.classList.toggle("short-row", problem.kind === "short");
        row.classList.toggle("current", number === current);
        row.classList.toggle("answered", answerIsFilled(answers[number]));

        const num = document.createElement("button");
        num.type = "button";
        num.className = "num";
        num.textContent = number;
        num.addEventListener("click", () => selectProblem(number));
        row.appendChild(num);

        if (problem.kind === "short") {
          const open = document.createElement("button");
          open.type = "button";
          open.className = "short-open";
          open.textContent = "단답";
          open.addEventListener("click", () => selectProblem(number));
          row.appendChild(open);
        } else {
          labels.forEach((label, index) => {
            const value = String(index + 1);
            const bubble = document.createElement("label");
            bubble.className = "bubble";
            bubble.title = `${number}번 ${value}번`;
            bubble.innerHTML = `
              <input type="radio" name="answer-${number}" value="${value}" ${answers[number] === value ? "checked" : ""} />
              <span>${label}</span>
            `;
            bubble.querySelector("input").addEventListener("change", () => chooseAnswer(number, value));
            row.appendChild(bubble);
          });
        }

        box.appendChild(row);
      });
    }

    function normalizeForGrading(value) {
      return String(value ?? "")
        .trim()
        .replace(/[０-９]/g, char => String(char.charCodeAt(0) - 0xff10))
        .replace(/\s+/g, "");
    }

    function getStudentAnswer(problem) {
      const value = answers[problem.number];
      if (!value) return "";
      if (problem.kind === "choice") return normalizeForGrading(value);
      if (problem.labels.length === 1) {
        return normalizeForGrading(value[problem.labels[0]] || "");
      }
      return normalizeForGrading(problem.labels.map(label => value[label] || "").join(""));
    }

    function gradeAnswers() {
      let earned = 0;
      let maxScore = 0;
      let correctCount = 0;
      const wrongNumbers = [];
      activeExam.problems.forEach(problem => {
        const score = Number(problem.score || 0);
        const correct = normalizeForGrading(problem.correct);
        const student = getStudentAnswer(problem);
        maxScore += score;
        if (correct && student === correct) {
          earned += score;
          correctCount += 1;
        } else {
          wrongNumbers.push(problem.number);
        }
      });
      return { earned, maxScore, correctCount, wrongNumbers };
    }

    function showScoreModal(result, answeredCount) {
      document.getElementById("scoreValue").textContent = `${result.earned}점`;
      document.getElementById("scoreDetail").textContent =
        `총점 ${result.maxScore}점 / 정답 ${result.correctCount}문항 / 응답 ${answeredCount}문항`;
      document.getElementById("scoreModal").classList.remove("hidden");
    }

    function submitAnswers() {
      const count = Object.values(answers).filter(answerIsFilled).length;
      lastGrading = gradeAnswers();
      saveSubmission(lastGrading);
      showScoreModal(lastGrading, count);
    }

    function enterWrongReview() {
      if (!lastGrading || lastGrading.wrongNumbers.length === 0) return;
      reviewMode = true;
      reviewNumbers = [...lastGrading.wrongNumbers];
      selectProblem(reviewNumbers[0]);
      updateCount();
      updateExplanationButton();
    }

    function moveProblem(direction) {
      if (!reviewMode || reviewNumbers.length === 0) {
        selectProblem(current + direction);
        return;
      }
      const index = reviewNumbers.indexOf(current);
      const nextIndex = Math.min(reviewNumbers.length - 1, Math.max(0, index + direction));
      selectProblem(reviewNumbers[nextIndex]);
    }

    document.getElementById("homeBtn").addEventListener("click", showStartScreen);
    document.getElementById("prevBtn").addEventListener("click", () => moveProblem(-1));
    document.getElementById("nextBtn").addEventListener("click", () => moveProblem(1));
    document.getElementById("submitBtn").addEventListener("click", submitAnswers);
    document.getElementById("scoreCloseBtn").addEventListener("click", () => {
      document.getElementById("scoreModal").classList.add("hidden");
      gradingConfirmCount += 1;
      if (gradingConfirmCount >= 2) {
        explanationEnabled = true;
      }
      enterWrongReview();
      updateExplanationButton();
    });
    document.getElementById("scoreModal").addEventListener("click", event => {
      if (event.target.id === "scoreModal") {
        event.currentTarget.classList.add("hidden");
      }
    });
    document.getElementById("explanationBtn").addEventListener("click", openExplanation);
    document.getElementById("explanationCloseBtn").addEventListener("click", closeExplanation);
    document.getElementById("explanationModal").addEventListener("click", event => {
      if (event.target.id === "explanationModal") {
        closeExplanation();
      }
    });
    document.getElementById("studentTabBtn").addEventListener("click", () => setLoginRole("student"));
    document.getElementById("teacherTabBtn").addEventListener("click", () => setLoginRole("teacher"));
    document.getElementById("brandBtn").addEventListener("click", () => setLoginRole("admin"));
    document.getElementById("loginForm").addEventListener("submit", handleLogin);
    document.getElementById("teacherGradeSelect").addEventListener("change", renderTeacherRecords);
    document.getElementById("teacherClassSelect").addEventListener("change", renderTeacherRecords);
    document.querySelectorAll(".logoutBtn").forEach(button => button.addEventListener("click", logout));
    document.querySelectorAll(".appHomeBtn").forEach(button => {
      button.addEventListener("click", () => {
        if (!currentUser) {
          showOnly("authScreen");
        } else if (currentUser.role === "student") {
          showStartScreen();
        } else if (currentUser.role === "teacher") {
          renderTeacherRecords();
          showOnly("teacherScreen");
        } else {
          renderAdminDashboard();
          showOnly("adminScreen");
        }
      });
    });

    renderGradeClassOptions();
    setLoginRole("student");
    showOnly("authScreen");
  </script>
</body>
</html>
